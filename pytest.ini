[pytest]
testpaths = tests
pythonpath = src
markers =
    regression_gate: frozen Replay current_rules regression gate (offline only)
    planning_regression: frozen AutoScholarQuery planning regression gate (gold-blind and offline only)
    gold_identity_regression: frozen AutoScholarQuery gold identity input regression gate (offline evaluator only)
    metric_semantics_regression: frozen deduplicated-gold metric migration gate (offline only)
    query_gold_leakage_regression: frozen AutoScholarQuery query-to-gold leakage gate (offline evaluator only)
    query_independence_regression: frozen AutoScholarQuery duplicate and stratum-independence gate (offline evaluator only)
    cluster_significance_regression: frozen lexical-normalization component-aware significance gate (offline only)
    evidence_registry_regression: tracked experiment evidence and default-policy gate (offline only)
    run_provenance_regression: deterministic run lineage and artifact integrity gate (offline only)
    execution_determinism_regression: cross-execution SearchService determinism gate (offline only)
    retrieval_resilience_regression: four-source retrieval degradation gate (offline only)
    human_precision_adjudication_regression: blinded human-label integrity and adjudication gate (offline only)
    crash_consistency_regression: Benchmark generation atomicity and crash recovery gate (offline only)
    reproduction_capsule_regression: portable self-contained Replay capsule gate (offline only)
    result_lineage_regression: field-level paper lineage and reconstruction gate (offline only)
    runtime_hermeticity_regression: controlled-subprocess Replay hermeticity gate (offline only)
    experiment_pairing_integrity_regression: pre-bound treatment isolation and symmetric query pairing gate (offline only)
