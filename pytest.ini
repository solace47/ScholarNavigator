[pytest]
testpaths = tests
pythonpath = src
markers =
    regression_gate: frozen Replay current_rules regression gate (offline only)
    planning_regression: frozen AutoScholarQuery planning regression gate (gold-blind and offline only)
    gold_identity_regression: frozen AutoScholarQuery gold identity input regression gate (offline evaluator only)
    metric_semantics_regression: frozen deduplicated-gold metric migration gate (offline only)
    query_gold_leakage_regression: frozen AutoScholarQuery query-to-gold leakage gate (offline evaluator only)
    query_independence_regression: frozen AutoScholarQuery duplicate and stratum-independence gate (offline evaluator only)
